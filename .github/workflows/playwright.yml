name: 🎭 Playwright E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 11 * * *'   # diariamente às 8h BRT (UTC-3)
  workflow_dispatch:
    inputs:
      suite:
        description: 'Suite a executar'
        required: false
        default: 'all'
        type: choice
        options: [all, smoke, regression]

jobs:
  test:
    name: 🧪 ${{ matrix.browser }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🎭 Instalar browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: 🧪 Executar testes (${{ matrix.browser }})
        run: |
          GREP=""
          if [ "${{ github.event.inputs.suite }}" = "smoke" ]; then
            GREP="--grep @smoke"
          elif [ "${{ github.event.inputs.suite }}" = "regression" ]; then
            GREP="--grep @regression"
          fi
          npx playwright test --project=${{ matrix.browser }} $GREP --ignore-glob='**/visual.spec.ts'
        env:
          CI: true
          BASE_URL:             ${{ secrets.BASE_URL }}
          TEST_USER_EMAIL:      ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD:   ${{ secrets.TEST_USER_PASSWORD }}

      - name: 📊 Upload relatório HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: reports/html-report/
          retention-days: 30

      - name: 📁 Upload artefatos de falha
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-${{ matrix.browser }}
          path: test-results/
          retention-days: 7

  publish-report:
    name: 📄 Publicar Relatório no GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Download relatório
        uses: actions/download-artifact@v4
        with:
          name: playwright-report-chromium
          path: reports/

      - name: 🚀 Deploy no GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: reports/
          destination_dir: playwright-report
